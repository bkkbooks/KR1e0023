body:
  text: 春秋意林春秋類提要臣等謹案春秋意林二卷宋劉敞撰宋史藝文志作二卷王應麟玉海作五卷馬端臨經籍考則併春秋權衡春秋𫝊春秋意林總題三十四卷今考權衡寔十七卷𫝊寔十五卷合以意林二卷正得三十四卷與宋志合則玉海作五卷𫝊寫誤也元呉萊常作是書後序云劉子作春秋權衡自稱書成世無有能讀者至意林猶未脱稿多遺闕今觀其書或僅標經文數字不置一詞或草草數言文不相屬而下註云云二字或一條之下别標他目一兩字與本文逈不相閒或佶屈聱牙猝難句讀或僅引其端而詞如未畢其為隨筆劄記屬稿未竟之書顯然可証萊所説誠不誣也又敞既苦志研求運意深曲又好雕琢其詞使在可解不可解之間然考葉夢得石林春秋𫝊稱不知經者以其難入或詆以為用意太過出于穿鑿然熟讀深思其間正名分别嫌疑大義微言灼然聖人之意者亦頗不少文體之澁存而不論可矣乾隆四十五年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:0f5f9da880a17aaeeb846c2354ec2ea8137e94b02455664b01736f71680365fb
