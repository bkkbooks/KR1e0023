body:
  text: 劉氏春秋意林卷上宋劉敞撰貴本元年春王正月隱不正而賢盟于蔑克段于鄢或不與使而不稱使或與之使而不稱使會戎君子之行禮有過於厚無過於薄者也歸惠公仲子之賵何以為非禮有不可朝而不與朝祭伯來是也有不能朝而不與朝介葛盧是也云云均寰內諸侯也蕭叔使人得言聘祭伯親之猶不言朝州吁石碏觀魚于棠人君者考仲子之宫與其成之與曰與之武焬初獻六羽以其言初也是將復有終也以其言六也是將復有八也春秋紀人事莫隆于君親君親之過必為之隱至于僭主畔君雖不斥言其失猶迂其意微其詞此乃臣之所以諫君子之所以事親也孔子曰禮樂征伐自諸侯出蓋十世希不失矣自隱公始者也衆仲之意欲遵君榮親也與聖人同而反陷之不義以漸其禍其所見者近也君子之為國不恃天之無災不惡物之有災者也其記有年螽螟何邪輸平宋人取長葛何其疾之也舜之伐有苖文王之伐崇滕侯卒猶周行人之禁僭也衛文公朝于周稱曰衛侯辟疆云云齊侯使其弟年來聘齊侯非不愛其弟也迷於其義迷於其義故以愛為害矣戎伐凡伯于楚丘伐者以上討乎下者也執者以正治乎不正者也凡伯雖不能死而戎安得而伐之而執之也哉故深逃其名而奪之義此春秋所以道名分也孔子曰惟器與名不可以假人此之謂也虛名猶不以借人况其實乎宋公衛侯遇于垂輕財重禮自為正之具也人之爭也常於其所怨其怨也常於其所親公及莒人盟于浮來易曰謙尊而光卑而不可踰隱公之謂謙矣而春秋譏之何哉涉他成何執牛耳挾卒春秋貴大臣之意也伐宋敗宋取郜取防滕侯薛侯來朝入許隱公之所以弒也德薄而多大功慮淺而數得意也備其四竟禍反在內可不哀與孔子曰人無遠慮必有近憂不在顓史而在蕭墻也宋人蔡人衛人伐戴鄭伯伐取之孔子謂子夏曰無欲速無見小利見小利則大事不成謂若此者也嘗試使鄭伯反此之義安其危而存其亡戴必北面終身不敢叛而四鄰歸之矣鄭可以霸滕侯薛侯來朝隱公之志也已驕晉侯使荀庚來聘衛侯使孫林父來聘固人臣也魯不敢同日而參盟丙午及荀庚盟丁未及孫良夫盟是也今一旦而朝兩國君不能識其非禮也而受之則非獨驕也志荒矣死不亦宜乎公薨賊不討而書葬者多矣或者春秋之失與非然也彼或討矣而不見於經桓公是也許田周公之邑也詩云居嘗與許復周公之宇蓋非方伯不得有湯沭之邑非周公不得世享其地孔父已見郜大鼎言取非其有也孔子問公叔文子於公明賈曰夫子不言不笑不取乎公明賈曰否夫子時然後言樂然後笑義然後取耳故茍以義三代之取天下而不為貪茍不以義宋之郜鼎齊之衛寶終不得為已有桓無王桓篡其兄外託於繼世而立是以免於諸侯之討至其喪終也宜以士禮見天子而受命焉又不能爾尚當因使者而請命以臨其民因使者而請命以臨其民雖非禮之正君子猶許之無衣之詩是也昔者晉武公兼其宗國而未得天子之命則不能安其身故其詩曰豈曰無衣七兮不如子之衣安且吉兮是上有事上之義而下得畏罪之善也今桓公一不受命遂終其身身沒之後乃追命耳安所受之邪茍無所受之享國雖久徒屬雖衆盜賊之未誅耳何諸侯之有不逆詐不億不信故必待喪畢而不受命也則可以無王誅矣齊侯衛侯胥命于蒲當此之時齊僖侯自以為小伯見國語而狄入迫逐黎侯黎之臣子亦以方伯連率之職責衛宣公也其在詩曰伯也執殳為王前驅所謂伯者州伯也八州八伯有年奚謂六榖六榖泛名也稷之屬一榖黍之屬一榖稻之屬一榖麥之屬一榖菽之屬一榖麻之屬一榖公狩于郎狩非其地爾而書之此春秋謹於微之意也以謂微事不謹則大事不立故每慎其微而後王德全矣宰渠伯糾春秋於大夫莫書其官至冡宰獨書之以此見任之最重也宰天下者莫名至糾獨名之以此見責之最備也周公作周禮冡宰之職固賞善誅惡進賢而退不肖正月甲戌史之闕文與非也仲尼之後俄然亡之三家者皆莫能出其理吾獨以陸淳之言為信由是觀之聖人之心其不傳於世也多矣雖然未必不傳也人皆以親見之為詳而傳聞之為粗夫親見之果不足以為詳而傳聞之果不足以為粗齊侯鄭伯如紀春秋惡其懷不義之心雖卒不能害而疾之與襲侵人之國無異此聖人誅意之效也故云兵莫憯於志莫邪為下矣問者曰今齊鄭以朝往以朝反而春秋惡之非逆詐與曰楚公子圍聘于鄭云云盟于宋大雩為説者皆曰成王康周公故賜魯以天子之禮樂祀上帝禘文王吾未知其然成王者周之盛王也其亦謹於禮矣禮之有天子諸侯之别自伏義以來未之有改也成王其惑歟然則魯之有天子禮樂殆周之末王賜之非成王矣昔者魯惠公使宰讓請郊廟之禮於天子天子使史角往惠公止之其後在魯實始為墨翟之學由是觀之使成王之世而魯已郊矣則惠公奚請惠公之請也殆由平王以下乎焚咸丘淫獵之過也古者誅不逐奔追不越防鄧侯吾離來朝鄧榖邇於楚而化其俗大國之君也而不能以禮自顯遂終春秋無與中國盟會者迹其衰亡之端自綏吾離始矣故禮者先王所以使人自定其位長世保民者也正月己卯蒸顔淵問為邦子曰行夏之時謂若此者也祭公來遂逆王后于紀祭公之來命魯以昏因之事者也若是則茍大夫可矣何待於三公三公大任也非所當輕使也任之大而使之輕使祭公得緣其義專命不報遂行如紀由輕重不相副也故王以輕使為失而祭公以遂行為專君令過則臣事放矣為此之節者王當使大夫命魯侯曰豫一人不能獨任天地宗廟之事未有內主豫一人將卜于紀薑氏委諸伯父伯父其以豫敬若先王之禮魯侯稽首對曰天子有命敢有弗恭使者以之言也復于王魯使大夫請於紀曰天子使某來命我寡君曰豫一人不能獨任天地宗廟之事未有內主豫一人將卜于紀薑氏使某也以告主人冝固辭固辭不獲命主人曰某也固辭不獲命敢不敬從先守某公之遺女若而人夫婦所生若而人然後天子命以其吉使上大夫用王后之禮逆以歸也此豈人臣之所當遂于竟外哉逆也稱王后歸也稱季薑此言禮之上下取豫進退先後各有所冝而不相悖也公卿謀之諸侯主之龜策諏之天子命之是王后矣然而未見宗廟也未覯君子也未覿羣臣也則不敢居其位其詞順以聽此正始之道王化之本也詩云未見君子憂心惙惙亦既見止亦既覯止我心則説周召之風也曹伯使其世子射姑來朝古者為人子三賜不及車馬立不中門坐不主奧享食不為槩祭祀不為尸不敢乘父之車不敢衣其衣所以示民有親也如之何其以諸侯朝哉此後世所以多子亂也十年春王正月其謂之存公何也曰諱之使若受命然春秋尊尊親親者也其於禮義刑政無所不為法非專為魯而已今桓公不受命當是時天子莫討諸侯莫非也獨春秋貶之爾故謂之無王春秋貶之謂之無王以此明天下則無乃傷于親親尊尊之意歟故於其甚極也諱而存之無甚乎六師移之之可諱矣詭而書王若謂桓公曰君之不能事天子若是其甚矣如又不改將不可救矣君如改諸則此其時矣此春秋之意也使桓公之臣有能及是母令其君終身不悟豈獨桓公得以受命書王為顯哉雖其臣子皆可録也王者之法蓋三不朝則六師移之六師移之宗廟墟矣禍孰重於此者是乃春秋所以殷勤於君親之至也譏惡不枉義諱過不誣善達其王心而已隱公喪終二年十一月是時始受命也當一朝後四年當再朝又四年當三朝凡桓公十八年唯其未畢喪未可以受命其餘以禮差之為六朝也三不朝輒一書王所以見天子制諸侯之節也非專為魯也來戰於郎戰者仁人之所惡也有不得已而應者矣未嘗得已而先之者也齊人衛人鄭人盟于惡曹齊自以為東州之長衛自以為北州之長而鄭固王卿士也相與會盟而君不行委之大夫春秋正本謹始知其後必且有大夫脅君交政之患則又有陪臣執國干上之禍其勢相召也故於是貶而絶之突歸于鄭突內因強臣之力赤外援戎狄之衆以奪其嫡而禍其宗皆有不仁之心姦桀之材春秋所惡也專治突則祭仲不明專治赤則戎不見故挈其上而易其下其罪一施之所以絶禍本禁首惡也鄭忽出奔衛使忽近君子遠小人與賢者圖事則固良子矣宋雖無道奚憚祭仲雖強奚恤莒展曹羈丙戌衛侯晉卒於此可以見聖人之政所可與人共者無不與人共也所不可與人共者則無與人共也嵗時之次日月之序此與人共者也褒貶之理豫奪之義此不與人共者也與人共者因其舊不與人共者加吾王心焉故曰夫子之文章可得而聞也夫子之言性與天道不可得而聞也燕師敗績春秋因行事以著成敗者也入春秋而來燕未嘗與諸侯之會也又未嘗交玉帛之使也其孤特僻陋之效可見於此矣殆不能守其國家幸而為榖之盟與中國通曽未旋踵也而反伐所與盟之國是慢於信而薄於義甚矣而不知惡者終於侵奪滅亡而不復序是以春秋貶而賤之曰為國家者視此偷得利而輕用衆其何如爾葬衛宣公此下傳可以廣中庸義宋人以齊人蔡人衛人陳人伐鄭賞當其功者也雖小人不害以有功賞罰當其罪者也雖君子不害以有罪罰是以王者賞不遺小人罰不隱君子象其事應其類而民信矣書宋人以齊人則足以知宋人者宋公也書晉人及薑戎則足以知晉人者晉侯也文不虛出必有其指緣於文以求其指則得之矣宋公殘人之國而毁其宗廟晉侯背父之殯而覆人之師其罪一也俱棄義犯禮於所至尊至親之地何其悖與鄭祖厲王非禮也非禮之禮其不可毁何也曰天子固命之矣國人固奉之矣有王者作是不可復存則已矣諸侯安得而毁之哉鄭之祖厲王猶魯之郊上帝也魯之郊上帝蓋有以不郊致譏矣未聞其以不郊為禮也鄭世子忽復于鄭忽之出無鄭者也而又不得稱子則忽之可以君國者無幾矣春秋别嫌疑明是非以謂忽雖失道乎固君之世子矣世子者必命於天子者也若側庶因亂得逐而奪之則天下之姦臣縱矣故正其名豫之繼世深惡亂臣賊子之意也蒯瞶得罪乎母見逐乎父凡人之情疑於不可繼世春秋豫之以為枉直有理也蔡友父死國滅凡人之情亦疑於不可繼世春秋豫之以為友之死得古者不共戴天之義此聖人聽小大之獄以情者也復歸有君臣之異言固不可槩舉也以其世也故可言復可言復而不言復者奪其國之意也以其不世也故不可言復不可言復而言復者效其竊取位之意也孔子以六尺之孤云云邾人牟人葛人來朝滕薛之旅見也與邾牟葛無異滕薛之貶輕而邾牟葛之貶重何也曰古之諸侯朝者固曰間於天子之事考禮正刑一德以尊天子焉耳滕薛是也今天王崩魯與三國未嘗奔問弔贈修臣子之職而方沛然以朝禮自處其義上僭是所以責之重也伐鄭春秋亂世以不正討正以不義伐義者衆故非所當納者奪之名所以别黑白異隂陽也歷序衛侯朔出奔齊二君歷序蔡季自陳歸于蔡蔡季之去其國與秦伯之弟針無以異秦伯之弟針以富懼誅蔡季以賢見疑俱不得安其身而季為顯矣晉太子申生知必不免而終不去以稱其父之欲衛公子伋知必見殺而終不忍逃以遂其弟之求行非不難也而春秋不貴是皆不明於權者也明於權者則莫如法舜矣舜之事叟小杖則受大杖則走故曰蒸蒸乂不格姦使申生衛伋深見輕重之分因負罪引慝超然遠舉必母陷其父兄有不義之名豈不益賢乎上為吳太伯下為蔡季使人不間於其父母昆弟之言此閔子騫之所以稱孝也葬蔡桓侯諸侯之國亦多矣莫能正死生之禮者桓侯之賢又未有聞於春秋吾以此效之桓侯非賢而蔡季請之可知矣人亦多愛其君者矣莫能愛其君以禮而蔡季行之此乃賢者之所以異於衆人也齊人莫如孟子敬王云云吾其為東周乎云云深察衆人之事君云云公夫人薑氏遂如齊僖公亦嘗以夫人會齊侯矣獨不惡其伉何也曰桓公薨于齊魯之臣子未能知賊之由夫人也故原其禍之所自始以伉言之微而顯志而晦之意也公子遂季孫行父如齊則以起子赤之弒季斯仲孫忌如晉則以起陪臣執國命之禍事之始構而文已變矣此亦春秋慮患於微除禍於早之情也葬我君桓公賊未討也而書葬春秋豈忘其君乎夫春秋之道將以為天下教後世必不忘其君茍不忘其君則桓公之書葬者賊既討也當是之時魯人卻尸以讓於齊曰請得彭生除君之惡亦徒知彭生之賊云爾齊強而魯弱故君子以謂討矣若使魯人知彭生之賊賊由齊侯齊侯之賊賊由夫人則必不但以誅彭生除君惡而春秋亦必不以殺彭生葬桓公矣知之有詳略故怨亦有深淺文應其事事如其理決獄聽訟之法也夫人孫于齊母子至親而不得不絶者義也春秋為人之不明於義而私其親有不忍也故示之以絶之之文單伯逆王姬上公九命侯伯七命子男五命公之孤四命此皆人君也有不生名之義故附庸稱字矣周禮有孤無附庸魯頌有附庸無孤附庸即孤孤即附庸附于大國故謂之附庸南面稱孤故謂之孤其實一也鄭康成以謂公無附庸侯伯子男有附庸以周禮考之公有附庸侯伯子男無附庸也何以言之邪周禮固云公之孤孤則附庸矣周禮無言附庸者而常獨言公之孤言公之孤必次之五等之下則孤者非諸臣也小國之君矣小國之君不得專達於天子而特附於大國之後是以謂之孤而儀禮或謂之諸公也謂之諸公者亦其自有國地之號也王使榮叔來錫桓公命王者之義必純法天天道豫善奪惡而無私者也今桓公篡君取國終不受命而王不能誅反追命之此無天法甚矣其失非小過小惡也與葬成風引之為夫人使妾並后無以異故其文一施之春秋所刺譏於王亦多矣皆莫謂之無天獨至於錫桓公命葬成風而以無天責之者王者之位至貴也至重也至大也不尸小事不任小義未可以小失貶也今臣殺君妾僭嫡而王尊禮之則王義廢人倫滅矣桀紂之所以失天下者固廢王義滅人倫者也不可以不深貶齊王姬卒莊公為之大功之服所以尊王命厚同姓也傳曰喪事不敢不勉此之謂也其能勉者春秋書之以見其好禮其不能勉者春秋因沒不書以見其不好禮夫好禮與不好禮之間相去遠矣葬桓王古者至敬不文故父黨無容非務為茍簡也以為父子天性其間不容言也故先王之制禮也象之有以多之為貴者矣又有以少之為親者矣有以文之為貴者矣又有以質之為親者矣道並行而不相悖也今春秋於魯至親於周至尊録魯之喪甚詳録周之喪甚略施於尊與親之文自然異也其情則一故以公親會之則不書葬不親會之則書葬以此見親會之常事也不親會之非常也使後世因是而明於臣子之義曰嗚呼臣之事君不可不親乎雖有功尚不可以為德乎其厚若此則天下之為君臣者定矣紀季以酅入于齊紀季見齊之必將滅紀故請先下齊以退敵兵存宗國若是而不可得則後五廟雖非正禮春秋豫之所以然者於王法諸侯本無得擅相滅之道也而有救攻捍患存亡繼絶之義如是則令紀將滅齊尚不得有其國而季固可因酅以續紀矣况但下之以存宗國乎與鄫世子巫異鄫君舉其國以仕魯欲身去南面而就臣虜之列是茍免而無亷恥者也况季公子耳以安君存國之故析地事仇又不可得然後援存亡繼絶之義使宗廟血食百姓有奉後嗣復見叔姬歸于酅是也可謂明於權矣易曰需于血出自穴順以聽也此之謂也剛長而進進且有傷善需之者順且聽而已故易不以為凶而春秋不以為貶此義之所需也易春秋之旨豈有異哉公次于滑非王事而去其國欲候便徼利焉猶冦也紀侯大去其國國滅君死之正也紀侯何以得擅去昔者滕文公問于孟子曰云云凡君與楚王坐少焉左右曰凡亡者三云云太王之事狄也事之以珠玉犬馬幣帛猶不止然後去由是觀之紀季以酅入于齊亦紀侯之所以事齊矣猶不止然後去是以紀季無譏於前紀侯見賢於後也王人子突救衛古者字雖曰伯某父而不備稱也有曰伯仲叔季者矣有曰某父者矣有曰子某者矣唯其所稱而書之子突討則不能服救則不能定春秋曷為貴之曰天下方無道賤奪貴少陵長天子不能禁者凡以紀綱失而賞罰不明也幸而發憤赫然以誅衛為事而諸侯成同類黨同行沮逆天子之命前雖貶之稱人未足以效王所為之是也故復託正於子突子突正則王正矣衛侯朔入于衛朔故嘗有國矣入而不言得復者不與復之意也為諸侯受之君君所不命而自取之雖有鄰國之助大亂之道也為此乃非所以復也齊人來歸衛寶郜之鼎雖在宋猶謂之郜鼎衛之寶雖在齊猶謂之衛寶尊天子之命貴先祖之守也天子所命先祖所守而喪之猶喪其土也茍喪其土則奚君矣星隕如雨自上下者謂之隕言不見其所自來從天而墮隕星隕石隕霜者也自下上者謂之雨言見其所自來有漸以致之雨雪雨雹雨螽者也螽必自地起雪雹則有雲霧之勢非若霜然自天隕也師還不遷怒之義也莊公之行未能充於此言也然而春秋貴之者以王者之道貴乎此言者也故言近而指遠者謂之善言守約而施博者謂之善道公及齊大夫盟于蔇夏公伐齊納糾仲尼正天下之義明德怨之處以謂德不可以報怨設之詭其理則去王遠矣故怨莫甚乎父母之仇而德莫重乎君國子民豈可相貿易哉楚王亡弓左右請求之王曰止亦楚人亡弓楚人得之耳仲尼聞之曰去其楚而可矣老子聞之曰去其人而可矣故譬斯言之於道也楚王其猶以怨報怨老子其猶以德報怨者乎皆非中於義之論也道之説若是者甚衆而學者莫能明也推老子以為至大不可及則悖矣夫豈知至髙者反下乃能成其髙至遠者反近乃能成其遠乎戰于乾時我師敗績國君之恥莫甚乎去南面而虜矣春秋欲人之安志矜節不茍生於大辱之地故雖其君佚獲猶不能諱而匿之乃以謂生而辱不如死而榮也齊師宋師次于郎公敗宋師于乘丘齊宋輕用其衆揚兵整旅以徑人之國而不名所伐欲窺利乘便快其攻取之意故使魯人恫疑憂恐出竒計詐謀以自救覆滅其軍百姓父子無辜陷沒此人君貪利輕用其衆之罪也蓋君子貴道德而賤功力上禮讓而下鄙爭魯人誠能不用詐謀推忠信奉辭令雖以膏沐止齊宋之師齊宋去矣其所以弭患止亂安國便民不亦益堅且久邪偷得一時之勝而忘長世之慮此小人釁於勇嗇於禍之咎非君子之道荆敗蔡師于莘論者以吳楚徐越為夷狄乎不然也吳楚徐越有狄之名無狄之情聖人者愼絶人吳太伯之後也楚祝融之後也徐伯益之後也越大禹之後也其上世皆有元德顯功通乎周室矣與中國冠帶之君奚以異徐始稱王楚後稱王吳越因遂稱王王非諸侯所當名也故深抑之雖然猶不欲絶其類是以上不使與中國等下不使與外裔均推之可遠引之可來也此聖人愼絶人也庠序之間不帥教者左移之右右移之左尚不變則移之鄉尚不變則屏之四夷及其屏之四夷也天子縞素為之不舉樂吾以此知之王者亦愼絶人也宋大水異者天所以譴人君使修德也故異至則內自省而已耳非所待於外也不當告告為失禮失禮則書災者害之及民物者也諸侯於四鄰固有恤病救急之義是所待於外也不可不弔弔為得禮得禮則書由此觀之凡物不當待於外者已不可不內自竭也其當待於外者人亦不可不勉趨之也此一天下之道也今居中國棄人道廢仁義則必死矣天子自稱曰豫一人大國之君自稱曰不榖列國之君自稱曰寡人小國之君自稱曰孤天子降名從大國大國降名從列國列國降名從小國自卑貶之義也紀叔姬歸于酅紀君奔國滅紀侯之沒尚不書也叔姬何以得書乎春秋欲因叔姬之行以明紀季之義言季之以酅入齊非利之也凡欲存國耳此其效也試使紀季挾反側之意也見宗國之危析地而求利焉此邾庶其莒牟夷何異春秋當絶之奚暇褎乎衆人疑其迹而春秋明其心所謂樂道人之善也齊人宋人陳人蔡人邾人會于北杏北杏之前未嘗有大夫羣會主斷於外者也猶惡曹以前未嘗有大夫羣盟主約於外者也二者皆首亂君臣之禮詩云弗躬弗親庶民弗信此之謂也君必自輕其任然後臣奪之國必自厭其政然後臣專之故名器不可以假人也子罕田常所以能劫君取國者非一日之積由君豫之柄而資之勢稍以凌遲遂流不反也故有北杏之會而後有扈之會有惡曹之盟而後有溴梁之盟君若綴旒然可謂極矣不愼其始之禍也宋人齊人邾人伐郳當是之時桓未成乎伯未成乎伯而伐人猶諸侯之相伐也諸侯之相伐則必推主兵者上之是以宋先序矣明年會于幽為九合之始始于幽終于淮合者九也而皆不以兵車同盟于幽盟未嘗不同也而稱同焉非同時之謂也蓋同所以名盟焉耳以周禮言之則殷見曰同同者巡狩殷國也以古文言之則再會而盟以顯昭明以覲禮言之則設方明主日月而命事者同盟也此皆天子巡狩諸侯朝覲方伯臨之者也非諸侯所自相命也是以春秋愼之諸侯且不可又况諸侯之大夫乎其失已甚矣此之謂屢盟書周官曰六年五服一朝又六年王乃時巡考制度于方嶽諸侯各朝于方嶽之下周禮大宗伯曰時見曰會殷見曰同左氏傳叔向曰冉朝而會以示威再會而盟以顯昭明三者一也六嵗則會會于王城之外十二嵗則盟盟于方嶽之下所言之有詳略耳及至晉文之制諸侯有事而會不協而盟亦原於時見殷同之義而稍簡濶矣用此觀之諸侯不得自相會盟可知也齊人執鄭詹責齊之辭也鄭詹自齊逃來責詹之辭也詹自以為有罪邪雖死之可矣自以為無罪邪尚何逃之有詹恐其無罪見殺因逃而茍免則是不知命也不知命者不足以為大夫古者四十而仕五十命為大夫五十命為大夫者為知命也公追戎于濟西此無愛民之意而有不仁之心任詐謀而尚竒功勝固不足多也况又不勝乎凡君之於其民也固猶父母之於子子陷水火父母不避焦溺而救之矣豈坐視之待其然且沒而施巧變哉公子結媵陳人之婦于鄄遂及齊侯宋公盟好功名任智數者亦多為義與權矣未必中也故明於王者之制乃可以為義王者之制諸侯不得擅相伐而有親親友賢善鄰之義此結所以得為魯設免難之䇿為齊宋畫講好之計俱合於道其功甚美而身固在竟外也與專命君側者異指是乃春秋之豫結者也伐我西鄙君子之於人常自反也曰我之不仁與人之不我愛也不信與人之不我誠也不恭與人之不我敬也則深思而篤行之既行之而彼猶若也斯拒之耳今魯未有以負於義而三國者輕加之兵故不受也君子可服以理而不可誣以過其自待也信而待人也正肆大眚陳人殺其公子禦冦以為大夫則非大夫也以為世子則非世子也然而書者知其為君之嫡也君之嫡雖未誓為世子未可以稱世子然而已有可以為世子之端矣故不可不重也王法貴嫡嫡子之生而其禮固己異矣王法正名嫡子雖生而異其禮茍未誓則不敢名世子也此道並行而不相悖者也輕重大小義各有施而不可亂此之謂禮之情祭叔來聘祭非無臣也不達於春秋所以正上下之禮也孔子曰大夫具官祭器不假聲樂皆具非禮也此之謂也公如齊觀社觀社與觀魚一也觀社稱如觀漁不稱如內外之辨也諸侯於其竟外可以言如於其竟內不可以言如蕭叔朝公為禮非其時猶非其禮也為禮非其處猶非其禮也為禮非其義猶非其禮也為禮非其物猶非其禮也九月郊五月蒸此之謂非其時蕭叔朝公此之謂非其處祭叔來聘齊侯來獻捷此之謂非其義邾人牟人葛人來朝此之謂非其物雖有肅敬之心繁飾之容而君子不受也故禮非其禮而猶不受必歸之正而止又况乎未始有正者乎夫人薑氏入入非致於廟之辭也將欲見大夫宗婦覿是以先言其入入非禮則覿非公矣古者以其所願於上者使下故下不勞以其所望於下者事上故上不忌廢其所以事上而欲下之向已也則怨舍其所以畜下而欲上之厚己也則僨僨怨者所以亡家喪身也曹羈出奔陳赤歸于曹赤之為者與鄭伯突無以異突因宋赤因戎皆奪其君然而春秋一貶之無上下之異者春秋治治不治亂者也使鄭忽曹羈事親而孝為上而禮在喪而哀臨事而恭大夫順之國人信之雖有宋戎之衆突赤之孽何緣而起然而君臣交爭兄弟為讎者上有失故下得也郭亡亡國之亡也未嘗不以其取亡亡之也而獨謂郭亡何哉郭之所以亡者與他國異他國之亡者所善不善所惡不惡也而郭之亡善善而惡惡善善而惡惡則賢賢而亡此天下之所疑故聖人愼之也善善而不能用無貴於知善矣惡惡而不能去無貴於知惡矣不能用之蔽至於怨不能去之蔽至於亂怨亂之興焉有不亡者乎故五榖之種非不美也其為不熟不如荑稗治國亦有五榖五榖不成何處而善哉會宋人齊人伐徐小事也而亂王者之制王者之制固曰諸侯不專征諸侯不專征是以屬之方伯連帥今齊以其事小其衆少而因使宋主之是則人自為政與諸侯無霸奚以異物蓋有其變微而其損大者此之類也不可不正也大無麥禾此言為國者之不可以無九年之蓄也三年耕餘一年之食九年耕餘三年之食三九二十七年則餘九年之食百官之奉賔客之禮不外求而足雖有水旱如堯湯之久而上下不憂今莊公在位二十八年矣而麥禾曽不足以待國用所謂寄生之君也臧孫辰告糴于齊此言大臣任國事治名而不治實之蔽也務農重榖節用而愛人則倉廪實不知為此事至而憂之何其末與魯人恱其名而以急病讓夷為功君子責其實而以不能節用為罪此王政之務本也莒慶來逆叔姬莒慶非有君命也叔姬非適諸侯也何以得書乎以公之自主之公之自主之則敵敵則書矣凡喜怒哀樂愛惡者人之情所不免也人之情所不免而無禮義之制則放而不反是以聖人物為之防使人乃廢心而任禮禮然而然不以私意損益其間未始有物者也每若是而天下服矣新延廄春秋二百四十二年所興作修舊多矣不必書也而延廄南門蓋微耳何故獨書哉又新宫災宣公之廟也太室屋壞魯公之廟也災與壞不能不修而經無修之文雉門及兩觀災記新作焉吾以此數者參之修舊不足書其書者皆非禮之制不務公室者也天子僭天道而後有諸侯僭天子諸侯僭天子而後有大夫僭諸侯大夫僭諸侯而後有陪臣僭大夫上為之下則有甚焉者矣故將欲撥亂世反諸正則莫若正己正己而物正矣故春秋於其僭君也必書必書之者必正之之意也而主人習其讀而問其傳則未知己之有罪焉此世學者所以迷而不悟也張瓌唐公問於劉子曰昔僖公修泮宫詩人頌之而春秋不書何哉劉子曰泮宫者諸侯之學也僖公修之得其時制則諸侯之事也不可勝書故春秋不書也春秋以制度弼其上為法而詩人以恩厚愛其君為事詩有過厚而春秋無虛美此其所以異也然則其書延廄南門何哉劉子曰延廄者天子之廄非諸侯之廄也南門者天子之門非諸侯之門也所謂庫門天子臯門雉門天子應門矣延廄之僭非莊公也過在可革而不革故曰新南門之僭自僖公始罪在不可為而為故曰新作夫春秋之記略常事簡小事謹大事所以經後世非史官之任也秋有蜚蜚之為物狀若牛而白首一目虬尾行水則竭行草則死見則其國大疫非中國之禽也故曰有有者所以明其無也鸜鵒不逾濟而蜚非中國之物暫而一至故不可言多而言有麋者中國所有也有之不足異而多則為異故不可言有而言多螽螟者中國所多也多不足怪而為災則害故不可言多而言災此制言之體也無所茍矣葬紀叔姬滅國不葬紀非酅酅非紀也而葬紀於酅所以順紀季也季之不取為國審矣問者曰葬紀叔姬為順紀季書乎為賢叔姬書乎為順紀季則非賢叔姬為賢叔姬則非順紀季而二者并言之何哉曰季之不取為國前見矣無待於葬叔姬乃知之蓋非叔姬之賢則亦不足葬故於是引而合之録善不遺小之意也齊人伐山戎桓公之威行乎天下天子不能制矣如是而又越竟以伐山戎諸侯震恐其重過於萬乘乃沛然自得矜功而語受命此君子所惡也故貶而人之昔文王三分天下有其二以服事紂有君民之大德有事君之小心蓋春秋所貴也詩云匪革其欲聿追來孝今以桓公之內行不修而多大功將有非望之圗何若哉公子牙卒殺也而卒之殺之當其罪故遂其隱之之意也當是之時魯人知公子牙之罪而莫知季友之謀也聞公子牙之死而莫謂季友之誅也使季子謀不緣君誅不當罪則春秋猶將探其專誅之惡以示後世矣聖人原情議獄以季子之為忠於國而適於權聽而豫之所謂大夫強而君殺之義也自三桓始者乃此之謂矣然則大夫非強雖有罪可殺君猶不得殺也齊仲孫來桓公不務修霸主之義討有罪扶微國而更使智計之士覘伺虛實令慶父極惡魯君再弒此由桓公仲孫不臧之蔽也故奪其君臣之常辭以見君使臣不以禮臣事君不以忠聖人法之所禁也故田恆弒其君孔子沐浴而朝告於哀公請討之夫事君之義捨孔子無可為者矣豈嘗沮其君以齊人尚強待其自斃哉吉禘于莊公説者以禘為諸侯之禮也何謬歟不王不禘禘之為王禮明矣王者禘其祖之所自出以其祖配之虞之所自出黃帝也而祖顓頊夏之所自出黃帝也而祖則禹啇之所自出嚳也而祖契周之所自出嚳也而祖文王今魯既用天子禮樂而祖周公故其禘也則主文王矣禘者帝也帝者天子之號也諸侯不得祖天子故禘不及諸侯也天子禘諸侯祫大夫享庶人薦此上下之殺也言禘郊者皆先禘後郊此以祖考之逺近為次禘之先郊猶祖之先宗也非以禘祭天而郊享帝也孔子曰魯之郊禘非禮言魯之郊禘則先郊而後禘此魯之郊主后稷而禘主文王驗也左氏曰魯有禘樂賔祭用之禘非諸侯禮又明矣髙子來盟魯君弒國亂夫人出奔上下莫相安齊桓公驁然有取魯之心使髙子將南陽之甲而至者非伐之也非正之也非聘弔之也髙子能深執忠臣之義勉其君於霸因事制宜立僖公而盟之魯國遂安以此見權在髙子髙子之為人臣忠也從義不從命矣孔子曰如有用我者吾其為東周乎夫東周之時大夫則強諸侯以凌天子陪臣則張私家以脅諸侯唯有道者不以利傷義耳僖公於閔非父子也然而春秋之詞與親父子相襲無以異所以明臣子一體也君之則我以臣事之父之則我以子奉之是故為人後者則為之子矣夫為人後者為之子非施於未有後之語也是乃已為後之理矣彼君子之將取後者取於族人兄弟之子則順及乎不得已矣而取兄弟亦安可不正以父子之禮奉之哉徒謂之父子則昭穆有逆故春秋通其文於君臣明此兩者一也彼不以子繼父則必以臣繼君矣君臣猶父子則父子亦猶君臣也舜之有天下祖顓頊而宗堯堯非同姓也受國焉爾非同姓尚宗之况親親者乎夫人氏之喪至自齊哀薑與乎亂殺二子幾亡國齊桓討而誅之是也此上之所以行乎下君之所以行乎臣伯者之所以行乎諸侯之義且哀薑安可復配宗廟復臨羣臣哉魯以臣子不得討而齊以伯主得舉法故臣子可緣伯主之命以尊宗廟伯主亦可緣天子之法以絶魯私請今齊以公義誅之而魯以私意請之是魯之不忍也而不可通於春秋故去薑氏以見焉異乎文薑文薑殺夫雖臣子得絶之矣哀薑殺子終不可以子故讎母唯伯主得行焉爾城楚丘言齊桓者以桓公之封衛德莫大焉雖衛人亦自以謂桓公之於我德莫大焉春秋書之曽無以異於常諸侯爾彼衛已滅矣無王命而擅封之是擅王命也擅王命諸侯之大罪也故以小惠評之則桓公為有德以大法論之則諸侯無專封孟子曰五伯三王之罪人此之謂也夏四月不雨六月雨文公之書不雨自十月至於秋七月其於民如此之慢也僖公之書不雨歷一時則書之其於民如此之閔也不獨書六月雨而已又先書四月不雨所以見有志乎民汲汲之甚也有志乎民汲汲之甚未足為聖人之法也然而春秋取之者凡南面而治有國家天下者患不與民同憂苛不與民同憂則亦不與民同樂矣唯有道者不然己未嘗有憂也民之所憂不可不憂己未嘗有樂也民之所樂不可不樂若是者所謂無常心而以百姓心為心是故與民同憂者王事之始也與民同樂者王事之成也此春秋所謂貴非得雨之謂其義則近矣許男新臣卒以許男卒于師乎當曰卒于師卒于會乎當曰卒于會今一無稱焉者此去其師與會而復驗之也春秋褒不失實貶不違理新臣之為人君不知命者也人之患莫大於不知命不知命則必畏死畏死則必貪生貪生則必亂於禮矣而後有容身茍免之恥而後有淫祀非望之惑燕昭秦始皇浚民竭國以自封焉不知命之蔽也云云楚屈完來盟于師盟于召陵桓公之威可謂盛矣責楚之包茅則諾問昭王之不復則辭然而不以己力之有餘而加人此雖益贊于禹班師振旅之義何異凡人之情強則暴服則懾今齊強而不暴楚服而不懾俱捐其私以義理相勝者也苟以義理相勝而無喜怒愛惡之遷則王事純矣故不多齊之有功而多楚之服罪不貴楚之能拒敵而貴齊之能不遂也齊人執陳袁濤塗齊桓之不可為周公亦明矣然而春秋以周公之義責焉者是乃其可以及可以責者也周公者自誠而明大而化變而神其桓公之謂乎至其用師治衆止於肅而已此猶可及也養民使臣止於恕而已此猶可及也聽訟決獄止於內自正而已此猶可及也為此三者是乃春秋所以責於桓公也盟于首止會盟同地而再言之者首止爾葵丘爾宋爾平丘爾皆有懿德美行超絶卓異非常之迹者也孔子曰書之重辭之復其中必有美者焉此之謂也首止君君臣臣父父子子此大法大經也葵丘盡王者之禁而宋弭天下之兵平丘興滅繼絶兼弱攻昧其名號甚順其事實甚厚雖從此語王道可矣豈亶為伯者事哉晉人執虞公春秋之記事原始見終不失其實者也故虞之滅自夏陽始夏陽滅則虞亡矣宫之竒舟之僑之徒皆知之獨其君不知故春秋因大見其釁於滅夏陽而深沒其迹於執虞公使天下之為人君者從而省之可以戒於此矣故曰家有既亡國有既滅由别之不别也可不大哀乎人君莫不惡亡而好存莫能固亡而保存是何也嗜欲之習近而憂患之來遠也扁鵲望見齊桓侯而却走人問其故對曰君有疾在骨髓不可救後五日桓侯體疾使人召扁鵲扁鵲去矣故當扁鵲之望而却走也雖謂桓侯之已死可矣桓侯雖未疾而有死形虞公之未執而有滅名桓侯仆於數日之後虞公虜於數嵗之末耳扁鵲善侯色而宫之竒善觀國其所為不同其深思遠慮一也鄭殺其大夫申侯從俗論之則申侯未有罪也而春秋君臣皆譏以為鄭伯內忌而殺申侯申侯雖不當誅亦有以取之故恭儉卑讓者常生術也雖有死者寡矣謂之不幸貪侈爭欲者常死術也雖有生者寡矣謂之幸故君子道其常而小人計其功桎梏死者在文王則正命也在陽虎則非命也孔子曰不知命無以為君子此之謂也禘于太廟用致夫人春秋雖亂世未有妾母稱夫人者也自成風始矣此禮之所由失教之所由廢上下之所由亂嫡庶之所由爭其惡乃比乎無父無君何以言之邪已之母父之妾也今背死而使之配此所謂知母而不知父故曰無父凡立小君嫡子必天子命之者也今以其私親而建之非有天子之命也故曰無君無父無君者王法所禁也而天子不能正是王無天也故召伯來會葬榮叔歸含皆以王之無天為譏也晉里克弒其君卓里克能不聽優施之謀寧喜能不從孫林父之亂陳乞能不隨景公之惑則晉無殺世子之禍衛無逐君之惡齊無立嬖孽之變矣患皆在偷合苟容逢君之惡故春秋成其君臣之名以正其篡弒之罪也所謂不知其義被之空言不敢辭矣不然卓與剽荼豈有冝為君之義哉陳平之王吕氏誅少帝也似此皆不明於大臣之分者也諸侯城緣陵異於城楚丘何也曰諸侯不專封專封而善僅可以贖過爾故平其文不使伯者獨享其功為人之迷於義而乃以專封為德也專封而不善是冒王法而又勤諸侯故異其文以見伯者之罪於專封之中而又有不善焉此皆貴王賤伯羞稱桓文之意比緣陵於城楚丘則楚丘善而緣陵不善矣比楚丘於王者之義則桓公救過之不給奚暇稱賢哉此其指也春秋貴義而不貴惠貴正而不貴功略小美而優大節以正待人而已矣晉文公為城濮之盟使諸侯朝王蓋朝者非獨魯也而獨書魯焉者以謂彼之為未足以為功故反循吾之常道而稱朝焉耳齊桓公城楚丘而封衛蓋城者亦非獨魯也而獨書魯焉者以謂彼之為未足以為功故反循吾之常義而稱城焉耳傳曰君子道其常小人計其功此類之謂也使俗人論齊桓晉文之功則必以謂莫或比髙焉而春秋曽未異之常人也此以正待人之體也厚而深博而遠優優大哉天地之德也夫沙鹿崩名號六鷁退飛過宋都人君遇怪異非常之變者當自內省而已非所以告同盟也同盟有分災救患之義故水火兵戎之為敗則告告則赴之赴則弔之此所待於外者也竒物妖變之至則天之所以警人君雖有堯湯之智反而責其躬此無待於外者也無待於外者何赴告之有春秋因而書之以見人君之莫能畏天命乃反以責於己者望於人也公子季友卒春秋譏世卿然莫甚於魯魯之大夫皆世卿然莫強季氏仲氏季氏出昭公而仲氏弒子赤此皆世卿能成其禍者也是以春秋異而書之其文婉其旨遠主人習其讀而問其傳則未知己之有罪固曰賢之耳吾以此論之非通於聖法之所出明於王事之所止由百世之後等百世之王莫之或失者未足以論春秋也宋公曹伯衛人邾人伐齊宋襄公有憂中國之心伯天下之意而道不足也故合諸侯舉大衆不務率義而先為不正以矜其力此其所以無成功也凡人之情以謂仁有置武有置仁置德武置服自公孫枝而有此言是故莫勉於為正而皆勉於為不正勉於為不正此及其所以失也秦穆宋襄既不遂伯而臧武仲又因以奔其身吾以此觀之順事恕施王事之始也邢人狄人伐衛詩云騂騂角弓偏其反矣兄弟昏因無胥遠矣爾之遠矣民胥然矣夫邢棄兄弟之親而從逺人焉其為反也不已甚乎使衛怨之卒以滅國其為然也不已信乎召穆公有言兄弟鬩于墻外禦其侮如是則雖鬩猶禦其外矣奈何而內侮哉宋人執滕子嬰齊執之是非決于稱人與稱侯而不繫名與不名者也然則嬰齊獨何為名哉諸侯不生名名者死之禮也今取死之禮加於執之日以此見其死矣不反矣然則虞公何以不名曰虞公者其國已亡其地已奪是滅而不能死者也雖釋之無所歸今嬰齊其身雖執其國尚全其釋之尚可復然而死不反甚可閔也所以異也邾人執鄫子用之春秋謹諸侯之死死以道者雖時有不名然猶以為非禮其不以道者則無不名所以終也文甚微而難察所以寄褒貶見善惡也夫邾人執鄫君而用之其罪易見鄫子犯非禮以喪其身其惡難諭蓋春秋所愼而辨也故曰春秋之道可以一言而盡者其本之謂乎楚人使冝申來獻捷楚暴犯中國欺詐諸侯執宋公而伐其國威動天下然而自卑屈於魯使人獻捷在衆人之情皆榮之而春秋抑而不豫也既貶其君又隱其捷乎宋以伸有道之弱而沮無道之勝孔子曰夷狄之有君不如諸夏之亡此之謂也宋公及楚人戰于泓宋師敗績宋襄公不厄人於險不鼓不成列此天下所謂至仁大義雖文王之戰不能過之者也而春秋惡之以其好戰而不務本飾小名而妨大德此無異盜跖之以分均為仁出後為義也彼君子不然正其義不謀其利修其道不急其功子夏為莒父宰問政於孔子孔子曰無欲速無見小利所謂欲速者遺本者也所謂小利者計末者也杞子卒論者以祀子為春秋貶之也是不然春秋謹名名正則言順言順則事成事成則禮樂興禮樂興則刑罰中今出爵分土以善惡為升降者此天子之任也而春秋得專之則名亂矣亂名改制且不免於誅何足以為春秋故春秋之所貴者名實不遷而是非之理正乃所以為不可及也衛侯燬滅邢滅人之國春秋之所惡也於所惡之中又有甚焉秦穆公衛侯燬是也兩君皆有賢名其惠足以使衆其威足以服敵就令其不能遵法守制舉干戈以覆人之國并人之地此則諸侯之強暴者爾雖有罪人猶得而備之今兩君皆出詭計險謀亂天地之性使臣反其君下畔其上以快已兼并之欲使雖有道之國不知所備甚可惡也豈得與他滅國者等哉秦穆見貶夷狄衛侯燬以名此理之出也仲尼弋不射宿鳥以宿尚不射而况君臣父子之間乎以為人之所以為人者乃以此也有毁是者是去其所以為人者也宋蕩伯姬來逆婦伯姬之嫁也固不見經今其來也且何為見經吾以此觀之內女雖親體不敵則不書於䇿不書於策所以尊君也今君失其禮以愛易典主大夫之昏是卑朝廷而慢宗廟非安上治民之節也公追齊師至酅弗及向曰齊人今曰齊師因是而知之所謂弗及非弗能及也弗敢及也弗敢及者畏也故諸侯之恥莫甚乎以一國畏矣善飬氣者匹夫不為千乘屈孔子是也夾谷之會齊師四陳揖讓指麾而景公服計齊人之衆不足以當景公計僖公之勢足以勝定之末年冦至不能禦去又不敢及是舉百姓而棄之者也豈為民父母之道哉於是乃使公子遂遠乞師於楚以自防耳從此揆之其持國之術所失者多矣楚人滅夔以夔子歸國滅而虜無不名者國滅罪也虜服辱也而夔何以獨不名夔之所以取滅者乃非其罪故假之也夔曰我先君熊摯有疾鬼神弗赦而自竄于夔吾是以失楚又何祀焉者楚祖鬻熊蘷祖熊摯是不得祀者也諸侯之祀無過其祖者夔子可謂若於義矣而楚反以是滅之春秋以謂非其罪也故黜楚而伸夔夔雖不幸而實無負於義有王者作興滅國繼絶世則夔庶幾矣公子買戍衛不卒戍刺之買貴矣率師以戍諸侯何以不書邪然則買自不當得書者也買受命而出在疆外矣進退得專之欲權冝以辟晉難故不卒戍也可謂識變矣而魯反誅之魯之脅於強楚不察忠臣之心甚矣故春秋憫而進之以謂不然買之往何以不書邪及楚人戰于城濮當是之時晉辟楚三舍欲戰者得臣也而春秋書晉焉得臣雖有必戰之意由先軫則激之是以書晉也此誅必原情之義也衛侯出奔楚諸侯去其社稷或有代之者或無代之者有代之者衛侯衎是也無代之者魯昭公是也春秋書有代之者則名之書無代之者則不名今衛侯有代之者矣而不名何哉言叔武之代之也實非代之也所惡代其君者為其奪之也今叔武代其君乃將復之也故正其號謂之衛子衛子之不取為君明矣故衛侯不得名也公朝于王所踐土之會天子自往也自往雖微而猶可言河陽之會臣召君也臣召君不可以訓故書狩焉曹伯襄復歸于曹衛候以殺叔武名曹伯以賂得國名其惡不同其貶一也此正性命之理也介葛盧來介盧中國之封也沉於蠻荒而變焉其車服辭命文物器械習與之同而不自覺焉故不得比儀父儀父以附庸之國能明其禮講信修睦與強國大邦立會盟之信其後益大爵至於子雖未有異聞固已進矣而葛盧腌然日損至比於蠻荒雖自卑貶一年再至魯修朝會之義而其禮俗不合諸夏無以交中國人之賢不肖相去豈不遠哉孔子曰里仁為美擇不處仁焉得智盟于翟泉公及莒人盟于浮來莒獨有人耳不沒公公之欲也今此多大國而又在王城之內豈諸侯大國皆微者豈公固欲之哉明公獨能事天子而列國之卿亂王室之禮王子虎不能正也使陪臣盟天子之側此所謂下凌上替也揚子雲曰節莫差於僭此之謂矣善為天下者於此乎防之安有失哉衛侯鄭歸于衛鄭之初歸也得言復當是之時叔武在內鄭雖無國國固其國也及其又歸也殺叔武矣執之歸於武師矣殺元咺及公子瑕矣鄭雖得國國非其國也故不言復春秋之褒善罰惡豈不至明至察哉向也無國而義可以有國則亦謂之有國今也得國而義不可以得國則亦謂之無國由是觀之天子者得天下之義者也非得其位也諸侯者得一國之義者也非得其勢也得其義雖未有其位君子謂之得矣失其義雖能專其勢君子謂之失矣故曰義重於富仁重於爵公子遂如京師遂如晉人臣無遂事者也其在竟外權國家之利則有遂公子遂如京師在竟外明矣人臣無專行者也唯中於義而有成功使朝廷尊而君益榮則免罪焉取濟西田可謂功矣爭地以戰殺人盈野爭城以戰殺人盈城智欺愚強脅弱不云少矣而非春秋所謂功也春秋所謂功者能事大國能反侵地能復周公之宇能事大國義也能反侵地功也能復周公之宇榮也三者所以豫其權也四卜郊不從乃免牲魯之郊非禮也明矣於非禮之中又有非禮焉説者以謂三王之郊一用夏正然則奚稱周之始郊日以至邪凡郊者天子之所以事天也故三代各自以其歲首而祀之明禮之至尊極大無有敢先之者董仲舒之議是也魯既以諸侯郊天不敢盡同王者故卜自建子之月而始也孟獻子乃以謂郊者祈農事耳彼見郊不過三月則以為啓蟄聞配用后稷則以為祈農事何其陋於禮也而仲舒又曰成王之使魯郊者蓋報德之禮然則成王亦且為非禮之禮非義之義而春秋則因而從之矣奈何哉吾以謂使魯郊者必周也然而必非成王其殆平王以下乎猶三望謂猶者可以己之辭何其不知春秋也春秋貴正貴偹安有廢大存小而又教之曰可以已哉是猶逐其父飬其母者而謂之曰可并逐母也亦誨之孝而已矣王介甫曰春秋內魯諱其惡而褒其善此內辭也曰不郊矣幸其猶三望也不告朔矣幸其猶朝于廟也然而春秋之義非致其至者也愈乎已則可矣是猶紾其兄之臂者而曰我且徐之以全吾愛云爾則可乎亦誨之悌而已矣故以猶為可以已者逐父而餋母之説也以猶為愈乎已者紾兄而徐之之説也君子不然彼不郊而三望自以謂猶愈乎已故譏之彼不告朔而朝廟自以謂猶愈乎己故非之君子之道乎致其至者也當其必為不曰可以已亦不曰愈乎已大事于太廟春秋記嘗記蒸記禘記郊未有曰大事者也此其曰大事何也曰是乃諸侯之大事也諸侯之事無大於此者矣祫之謂也奚以言之王者禘禘其祖之所出以其祖配之諸侯祫毁廟之主陳乎太祖大夫士享或四廟或三廟或二廟庶人薦於寢故曰德厚者流光德薄者流卑時祭稱有事祫祭稱大事大之外無加者矣以是推之魯之郊禘非禮也大夫有善於其君則於祫及其髙祖諸侯有善於天子則禘其祖之所自出皆周之未造也非太平制名器正上下之分也楊子雲曰節莫差於祭唯心通其義者知之乎逆婦薑于齊正始之道也待之不以夫人之禮故夫人不以其位終國亂子弒強臣擅命幾於亡矣夫文公非不欲存妻子傳世者也暗弱惰慢不能率禮而行以謂苛若而可何禮之守故卒至於禍也夫婦之際人倫之首可不愼哉故鑒末以原本因微以知著又非獨文公之罪也雖夫人預有罪矣當是之時夫人不能早避喪娶之辱冒大禮以往國人皆賤之遂無所據依以危其身而亡其子由本不正故也殆而呼天不亦晚乎吾以此觀之禮之於人大矣是存則存是亡則亡文公之不能保其後嗣者由無以刑其妻也夫人之不能安其位者由無以謹於禮也此正始之道也王使榮叔歸含且賵不知者乃以謂天子賵人之妾小過耳而譏之深求車殺母弟大惡也而譏之略是不及知春秋正人倫之意也君臣也父子也夫婦也治之三綱也道莫先焉桓以臣殺君而王命之成風以妾僭嫡而王成之於三綱廢矣是去人之所以為人也王之無天不亦明乎古之為文者三畫而一貫之為王一貫之者謂能法天也苟不能法天何王之稱晉殺其大夫陽處父即事探情陽處父可謂無罪矣而春秋不免也以謂陽處父之自事其身者未始至於得其死之道則其死非不幸也孔子曰人之生也直罔之生也幸而免使處父而得其死者固幸爾豈直之謂乎子路侍側行行如也子曰由不得其死然盆成括有才而不聞君子之大道孟子曰死矣故君子愛其身全其生者必由其道由其道而死雖若比干焉仲尼謂之仁矣愛其身全其生而不由其道不由其道而死雖若處父焉春秋謂之罪矣春秋不貴幸而免宋人殺其大夫不深惡其下之犯上專殺而反病其君大夫之不能親親此正本之意也詩云騂騂角弓偏其反而夫反之而反者固自古記之矣於是乎知堯之克明峻德以親九族為王治之大也公會諸侯晉大夫盟于扈趙盾既內專廢置其君而又外強諸侯盟王者之法所不當受也故斥而遠之若曰陪臣執國命漸不可長已此非其所得為也宋人殺其大夫司馬愛人弗親反其仁敬人弗答反其禮正己而物正矣宋君幼司馬惡故使華孫得因隙乘衆託於義而為利春秋并疾之故貶司馬於前冝其誅死而斥華孫於後以禁暴亂也楚子使椒來聘前此者楚不與中國通其交於中國也名號僭而無法故外於中國得見於春秋者皆必有非常之事焉今使椒來聘其號辭順其禮節中然後始均之中國矣故諸侯一也能自藩飾以禮樂者則謂之中國不能自藩飾以禮樂上慢下暴者則外之中國內外之别不在遠近而在賢不肖苟賢矣雖居四海謂之中國可也苟不肖矣雖處河洛謂非中國可也楚成王以力為強執宋襄公戰勝天下威脅諸侯雖書春秋而不得以其爵通今使椒來聘常事耳自卑貶其名修下人之義而得編於諸侯君臣俱榮以此見德為貴力為下矣秦伐晉春秋褎善貶惡不失其實者也其可信在義不在事是故雖無其事而論之中於義援其比引取之可也雖有其事而論之倍於義推其比勿信之可也孔子曰舉一隅不以三隅反則勿復也此之謂也叔孫得臣敗狄于鹹非長狄乎曰非也春秋正名狄也戎也淮夷也白狄也赤狄也山戎也夷蠻也陸渾戎也薑戎也是不一名公還自晉鄭伯會公于棐文公之德未能有以異於衆未足以任重也一舉動而二國附之者所履信而所思順也若是者天地應之而况於人乎試使文公於沓之會不能通其至誠以固兄弟之國則鄭將疑惡之奚有於好試使文公交二國而非除怨修睦之謂則春秋將鄙賤之奚有於善吾以此觀之履信思乎順又以尚賢者春秋之事也晉人納捷災于邾弗克納郤缺聞過而改見義而徙奚為而不免於貶曰春秋之所謂賢者非賢於人之謂也必致之仁聖之域王者之道然後止矣今郤缺之事不恥過作非以堯舜之法論之僅得免怙終之刑耳何足以言賢夫賢者之事其君言必謀於義動必順於道不逆寡不雄成是以無過舉奚有用賤凌貴用少凌長傷財害民以力為之者哉使此其為諸侯大夫則足矣以為王者之佐則未可公孫敖卒于齊敖不循法度自絶於魯而猶卒之春秋不以為非以謂君臣之間厚莫重焉故君誠有禮於其臣則臣可以死可以亡君誠有恩於其臣則臣雖死雖亡而不怨也若是而國家之禍亂遠矣宋子哀來奔君子貴見微而賤死禍見微者大臣之操也孔子曰所謂大臣者以道事君不可則止諸侯盟于扈大者天地其次君臣道莫先焉晉為伯主齊弒其君興諸侯而莫能正晉則固有罪矣諸侯又莫之討不亦病乎夫諸侯不專征者也田恆弒簡公而孔子請討焉是豈非義而孔子行之哉固以謂天地之道君臣之義是乃其冝者也從此觀之盟于扈之意晉則固有罪而諸侯亦病矣齊人來歸子叔姬出夫人者未嘗不使大夫將命也彼其曰郯伯姬來歸此其曰齊人來歸子叔姬何哉曰春秋正名别賢不肖使勿相亂者也義屈則屈義直則直郯伯姬以罪出雖父母於其子而不敢以私愛害公義辭不教而已矣子叔姬以禍亂逐非得罪於先君者也魯雖受之其義固可以自直故謂之齊人來歸明罪之在也凡人之議法也所親則回所踈則察君子不然親則憐之而不以愛妨公踈則容之而不以枉誣正所以見王者之事也毁泉臺臧文仲祀爰居而文公毁泉臺此皆迷民以怪者也爰居之不書展禽之力矣君子愼所以導民乎公子遂叔孫得臣如齊春秋之文有常有變變用於變常用於常不相襲也變之甚微讀者難知也則以為史耳乃春秋則欲起問者見善惡也公子遂將弒君謀之齊而後決陽貨將竊國謀之晉而後發而經書子卒盜竊寶玉大弓其實尚隱故原其禍亂之始邪謀之發著之奉使之日以見非常也使學者比其類揆其情因是而知之所謂微而顯志而晦者也非聖人孰能修之哉齊與人之大臣謀弒其君晉與人之陪𨽻謀覆其國意俱惡而禍俱大此春秋所以異而惡之也劉氏春秋意林卷上
